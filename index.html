<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xan</title>
    
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.5); 
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 255, 255, 0.4); 
            --custom-cursor: url('https://cur.cursors-4u.net/games/gam-4/gam372.cur');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: var(--custom-cursor), auto !important; }

        body {
            background: #000; color: white; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
            position: relative;
        }

        #splash {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center; transition: 1s ease;
        }
        #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        #bg-video {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.4) blur(2px);
        }

        .card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px; padding: 40px; 
            width: 90%; max-width: 400px;
            text-align: center; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15), 0 25px 60px rgba(0,0,0,0.9);
            position: relative; z-index: 10;
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            .card { padding: 25px 20px; max-width: 330px; }
            .username { font-size: 1.8rem; }
            .avatar-container { width: 85px; height: 85px; }
            .social-icon { width: 40px; height: 40px; font-size: 1.1rem; }
            .box { padding: 10px; margin-top: 10px; gap: 10px; }
        }

        .avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .avatar-main { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.2); object-fit: cover;
            transition: box-shadow 0.3s ease;
        }
        .avatar-container:hover .avatar-main { box-shadow: var(--glow); }

        .status-badge { position: absolute; bottom: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid #141414; z-index: 11; }
        .online { background: #43b581; }
        .dnd { background: #f04747; }
        .idle { background: #faa61a; }
        .offline { background: #747f8d; }

        #name-wrapper { position: relative; display: inline-block; padding: 0 20px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .username { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        
        .particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 1; filter: blur(0.5px); animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-35px); opacity: 0; }
            20% { opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateY(15px); opacity: 0; } 
        }
        
        .socials { display: flex; justify-content: center; gap: 15px; margin: 15px 0 25px; }
        .social-icon {
            width: 46px; height: 46px; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-size: 1.3rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .social-icon:hover { transform: scale(1.2) rotate(10deg); box-shadow: var(--glow); }

        .box {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 16px;
            padding: 12px 18px; margin-top: 15px; display: flex; align-items: center; gap: 15px; text-align: left;
            text-decoration: none; color: inherit; transition: all 0.3s ease;
        }
        .box:hover { box-shadow: var(--glow); }
        .pfp-small { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
        
        .mini-progress { width: 100%; margin-top: 8px; display: none; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        #progress-fill { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; }
        .progress-times { display: flex; justify-content: space-between; font-size: 0.65rem; color: #888; margin-top: 4px; }

        /* --- RESTORED GLOWING PLAYER --- */
        .profile-player { 
            margin-top: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 18px; padding: 20px; border: 1px solid var(--border); 
            display: flex; flex-direction: column; gap: 12px; transition: all 0.3s ease;
        }
        .profile-player:hover { box-shadow: var(--glow); }
        .player-row { display: flex; align-items: center; gap: 15px; position: relative; }
        
        #audio-progress-container { flex-grow: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; overflow: hidden; }
        #audio-progress-bar { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; }

        /* --- AMAZING VERTICAL VOLUME SLIDER --- */
        .volume-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        
        .volume-slider-container {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border);
            padding: 15px 10px; border-radius: 12px; display: none;
            flex-direction: column; align-items: center; z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .volume-wrapper:hover .volume-slider-container { display: flex; }

        .volume-slider {
            -webkit-appearance: none; appearance: none;
            width: 5px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 10px; outline: none;
            cursor: pointer; writing-mode: bt-lr; -webkit-appearance: slider-vertical;
        }

        /* The Glow Thumb from your screenshot */
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; background: #fff; border-radius: 4px;
            box-shadow: 0 0 15px 4px rgba(255,255,255,0.9); /* Intense Glow */
            border: 1px solid #000; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash" onclick="enterSite()"><div style="letter-spacing:5px; font-weight:700;">[ CLICK TO ENTER ]</div></div>

    <video loop muted playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="card">
        <div class="avatar-container">
            <img id="top-avatar" src="" class="avatar-main">
            <div id="status-badge" class="status-badge offline"></div>
        </div>

        <div id="name-wrapper"><h1 class="username">xan</h1></div>
        <p style="color:#777; margin-bottom:10px;">@xanipulate</p>

        <div class="socials">
            <a href="https://www.instagram.com/olekyyy/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@olekyyy" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
            <a href="https://discord.com/users/1290742786563506237" target="_blank" class="social-icon"><i class="fab fa-discord"></i></a>
        </div>

        <div id="activity-link" class="box">
            <img id="activity-pfp" class="pfp-small" src="">
            <div style="flex-grow: 1; overflow: hidden;">
                <div id="activity-text" style="font-size: 0.85rem; line-height: 1.4;">Connecting...</div>
                <div id="mini-bar" class="mini-progress">
                    <div class="progress-bg"><div id="progress-fill"></div></div>
                    <div class="progress-times"><span id="curr">0:00</span><span id="total">0:00</span></div>
                </div>
            </div>
        </div>

        <a href="https://www.roblox.com/users/1115362461/profile" target="_blank" class="box">
            <img id="rbx-pfp" class="pfp-small" src="">
            <div><strong id="rbx-display">Roblox</strong><br><span id="rbx-user" style="color: #888; font-size: 0.8rem;">@Loading</span></div>
        </a>

        <div class="profile-player">
            <div class="player-row">
                <i id="play-icon" class="fas fa-play" style="width: 20px; cursor: pointer;"></i>
                
                <div style="flex-grow: 1;">
                    <div id="audio-progress-container">
                        <div id="audio-progress-bar"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.65rem; color: #555; margin-top: 8px;">
                        <span id="audio-curr">0:00</span><span id="audio-total">0:00</span>
                    </div>
                </div>

                <div class="volume-wrapper">
                    <div class="volume-slider-container">
                        <input type="range" id="volume-ctrl" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
                    </div>
                    <i id="vol-icon" class="fas fa-volume-up" style="font-size: 0.9rem; cursor: pointer; opacity: 0.7;"></i>
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio" src="music.mp3" loop></audio>

    <script>
        const ID = { discord: "1290742786563506237", roblox: "1115362461" };
        let spotifyInt;
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-icon');
        const volSlider = document.getElementById('volume-ctrl');

        function spawnParticle() {
            if (document.hidden) return;
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 2; 
            p.style.width = `${size}px`; p.style.height = `${size}px`; p.style.left = `${Math.random() * 100}%`;
            p.style.background = '#fff'; p.style.boxShadow = `0 0 10px 2px rgba(255,255,255,0.8)`;
            const duration = Math.random() * 2 + 1.5; p.style.animationDuration = `${duration}s`;
            document.getElementById('name-wrapper').appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }
        setInterval(spawnParticle, 300);

        function enterSite() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('bg-video').play();
            audio.play(); playBtn.className = "fas fa-pause";
        }

        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playBtn.className = "fas fa-pause"; } 
            else { audio.pause(); playBtn.className = "fas fa-play"; }
        };

        volSlider.oninput = (e) => {
            audio.volume = e.target.value;
            const icon = document.getElementById('vol-icon');
            if (audio.volume == 0) icon.className = "fas fa-volume-mute";
            else if (audio.volume < 0.5) icon.className = "fas fa-volume-down";
            else icon.className = "fas fa-volume-up";
        };

        document.getElementById('audio-progress-container').onclick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        };

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('audio-progress-bar').style.width = (perc || 0) + "%";
            const fmt = (s) => new Date(s * 1000).toISOString().substr(14, 5);
            document.getElementById('audio-curr').innerText = fmt(audio.currentTime);
            document.getElementById('audio-total').innerText = fmt(audio.duration || 0);
        };

        function initLanyard() {
            const ws = new WebSocket('wss://api.lanyard.rest/socket');
            ws.onmessage = (e) => {
                const pkg = JSON.parse(e.data);
                if (pkg.op === 1) {
                    ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: ID.discord } }));
                    setInterval(() => ws.send(JSON.stringify({ op: 3 })), pkg.d.heartbeat_interval);
                }
                if (pkg.t === 'INIT_STATE' || pkg.t === 'PRESENCE_UPDATE') updateStatus(pkg.d);
            };
        }

        function updateStatus(d) {
            clearInterval(spotifyInt);
            const text = document.getElementById('activity-text');
            const pfp = document.getElementById('activity-pfp');
            const topAvatar = document.getElementById('top-avatar');
            const bar = document.getElementById('mini-bar');
            const status = document.getElementById('status-badge');
            
            const avatarUrl = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;
            bar.style.display = 'none';
            status.className = `status-badge ${d.discord_status}`;
            topAvatar.src = avatarUrl;

            const game = d.activities.find(a => a.type === 0 && a.name !== "Spotify");
            if (game) {
                text.innerHTML = `Playing <b>${game.name}</b><br><span style="color:#888;">${game.details || "In-game"}</span>`;
                pfp.src = (game.assets && game.assets.large_image) ? (game.assets.large_image.startsWith("mp:external") ? game.assets.large_image.replace(/mp:external\/.*\/https\//, "https://") : `https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png`) : avatarUrl;
                return;
            }

            if (d.listening_to_spotify && d.spotify) {
                text.innerHTML = `Listening to <b>${d.spotify.song || "Song"}</b><br><span style="color:#888;">by ${d.spotify.artist || "Artist"}</span>`;
                pfp.src = d.spotify.album_art_url || avatarUrl;
                bar.style.display = 'block';
                startBar(d.spotify.timestamps);
                return;
            }

            text.innerHTML = "Chilling"; pfp.src = avatarUrl;
        }

        function startBar(ts) {
            const move = () => {
                const total = ts.end - ts.start;
                const elapsed = Date.now() - ts.start;
                const perc = Math.max(0, Math.min((elapsed / total) * 100, 100));
                document.getElementById('progress-fill').style.width = perc + "%";
                const fmt = (ms) => new Date(ms).toISOString().substr(14, 5);
                document.getElementById('curr').innerText = fmt(Math.max(0, elapsed));
                document.getElementById('total').innerText = fmt(total);
            };
            move(); spotifyInt = setInterval(move, 1000);
        }

        async function getRoblox() {
            try {
                const info = await fetch(`https://users.roproxy.com/v1/users/${ID.roblox}`).then(r => r.json());
                document.getElementById('rbx-display').innerText = info.displayName;
                document.getElementById('rbx-user').innerText = `@${info.name}`;
                const thumb = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${ID.roblox}&size=150x150&format=Png`).then(r => r.json());
                document.getElementById('rbx-pfp').src = thumb.data[0].imageUrl;
            } catch (e) {}
        }

        initLanyard(); getRoblox();
    </script>
</body>
</html>
